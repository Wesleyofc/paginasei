<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SEI - Erro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #e6e6e6;
    }

    /* Topo */
    .top-bar {
      background-color: #0b5e7a;
      color: white;
      padding: 5px 15px;
      font-size: 14px;
    }

    .header {
      background-color: #1789a6;
      color: white;
      padding: 15px;
      font-size: 22px;
    }

    /* Container */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 90px);
    }

    .box {
      background: #f5f5f5;
      padding: 30px;
      width: 400px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    /* Logo igual ao login */
    .logo {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .logo span:first-child {
      color: #2b8ac6;
    }

    .logo span:last-child {
      color: #8cc63f;
    }

    /* Texto */
    .title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    /* Botão */
    .btn {
      display: inline-block;
      padding: 12px 20px;
      background-color: #2d6d9f;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #255a83;
    }

  </style>
</head>

<body>

  <div class="top-bar">PMJG</div>
  <div class="header">Sistema Eletrônico de Informações</div>

  <div class="container">
    <div class="box">

      <!-- Logo SEI replicada -->
      <div class="logo">
        <span>se</span><span>i!</span>
      </div>

      <div class="title">Erro na alteração da Senha</div>

      <div class="subtitle">
        Não conseguimos alterar sua senha por erro de conexão com o servidor.<br><br>
      </div>

      <a href="https://sei.jaboatao.pe.gov.br" class="btn">
        Acessar SEI
      </a>

    </div>
  </div>

</body>
</html>
